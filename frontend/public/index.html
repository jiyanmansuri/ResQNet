<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0f1e" />
    <meta
      name="description"
      content="ResQNet — AI-powered real-time disaster response command dashboard"
    />

    <!-- Leaflet CSS (loaded here so it is available globally before React mounts) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <title>ResQNet — Disaster Response</title>

    <style>
      /* Base reset so React mounts into a clean full-viewport root */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        height: 100%;
        width: 100%;
        background: #0a0f1e;
        color: #e2e8f0;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* Prevent white flash while JS loads */
      body { overflow-x: hidden; }
    </style>
  </head>
  <body>
    <noscript>ResQNet requires JavaScript to run.</noscript>
    <div id="root"></div>
  </body>
</html>
